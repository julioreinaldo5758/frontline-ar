server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Binary AR assets — serve as octet-stream, skip gzip
    location ~* \.(glb|mind)$ {
        default_type application/octet-stream;
        add_header   Cache-Control "public, max-age=86400";
        gzip         off;
    }

    # Audio
    location ~* \.mp3$ {
        default_type audio/mpeg;
        add_header   Cache-Control "public, max-age=86400";
        gzip         off;
    }

    # Everything else
    location / {
        try_files $uri $uri/ =404;
    }
}
