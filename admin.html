<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontline AR — 3D Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C8980A; --gold2: #E2B830; --gold-dim: #8A6A08;
      --gold-bg: #110D02; --bg: #080807; --surface: #0F0E0B;
      --border: #1E1C14; --border2: #2C2918;
      --text: #EDE8DC; --muted: #7A7260;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); font-family: 'DM Sans', system-ui, sans-serif; color: var(--text); display: flex; flex-direction: column; }

    /* Header */
    .hdr { height: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border2); }
    .hdr-brand { font-family: 'Gilda Display', serif; font-size: 1rem; font-weight: 400; color: var(--gold); letter-spacing: 6px; }
    .hdr-sub   { font-size: 0.52rem; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }
    .hdr-right { display: flex; gap: 8px; }

    .main { flex: 1; display: flex; overflow: hidden; }

    /* Viewport */
    .vp { flex: 1; position: relative; background: var(--bg); }
    canvas { display: block; width: 100%; height: 100%; }

    .vp-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: rgba(8,8,7,0.88); }
    .spin { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .vp-overlay p { font-size: 0.75rem; color: var(--muted); text-align: center; padding: 0 20px; }

    .vp-toolbar { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; background: rgba(8,8,7,0.9); backdrop-filter: blur(12px); border: 1px solid var(--border2); border-radius: 99px; padding: 5px 8px; }
    .vb { background: transparent; border: 1px solid transparent; color: var(--muted); padding: 5px 14px; border-radius: 99px; font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 500; cursor: pointer; transition: all 0.13s; white-space: nowrap; letter-spacing: 0.3px; }
    .vb:hover  { background: var(--gold-bg); color: var(--text); border-color: var(--border2); }
    .vb.active { background: var(--gold-bg); border-color: var(--gold-dim); color: var(--gold2); }

    /* Panel */
    .panel { width: 272px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border2); overflow-y: auto; display: flex; flex-direction: column; }
    .panel::-webkit-scrollbar { width: 3px; }
    .panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .sec { padding: 13px 14px; border-bottom: 1px solid var(--border); }
    .stitle { font-size: 0.52rem; letter-spacing: 3px; color: var(--gold-dim); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }

    /* XYZ inputs */
    .xrow { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .xlbl { font-size: 0.62rem; color: var(--muted); width: 56px; flex-shrink: 0; line-height: 1.3; }
    .xinp { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-size: 0.74rem; padding: 5px 7px; text-align: center; outline: none; transition: border-color 0.13s; font-family: 'DM Sans', monospace; }
    .xinp:focus { border-color: var(--gold-dim); }
    .xinp.cx { border-color: rgba(200,80,80,0.25); }  .xinp.cx:focus { border-color: rgba(200,80,80,0.6); }
    .xinp.cy { border-color: rgba(80,180,80,0.25); }  .xinp.cy:focus { border-color: rgba(80,180,80,0.6); }
    .xinp.cz { border-color: rgba(80,120,220,0.25); } .xinp.cz:focus { border-color: rgba(80,120,220,0.6); }

    /* Scale */
    .srow { display: flex; align-items: center; gap: 10px; }
    input[type=range].sl { flex: 1; height: 3px; border-radius: 4px; cursor: pointer; -webkit-appearance: none; appearance: none; outline: none; background: linear-gradient(to right, var(--gold) var(--p,40%), var(--border2) var(--p,40%)); }
    input[type=range].sl::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--gold2); cursor: pointer; box-shadow: 0 2px 8px rgba(200,152,10,0.4); }
    .snum { font-size: 0.74rem; color: var(--gold2); font-family: monospace; min-width: 34px; text-align: right; }

    /* Toggle */
    .arow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .albl { font-size: 0.72rem; color: var(--text); flex: 1; }
    .tog { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .tog input { opacity: 0; width: 0; height: 0; }
    .tog-sl { position: absolute; inset: 0; background: var(--border2); border-radius: 18px; cursor: pointer; transition: 0.17s; }
    .tog-sl::before { content: ''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: var(--muted); border-radius: 50%; transition: 0.17s; }
    .tog input:checked + .tog-sl { background: var(--gold-bg); border: 1px solid var(--gold-dim); }
    .tog input:checked + .tog-sl::before { transform: translateX(14px); background: var(--gold2); }

    .asub { display: flex; gap: 7px; margin: 0 0 9px 4px; }
    .asub-col label { font-size: 0.57rem; color: var(--muted); display: block; margin-bottom: 3px; }
    .asub-col input { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-size: 0.7rem; padding: 4px 6px; width: 70px; outline: none; text-align: center; font-family: 'DM Sans', sans-serif; }
    .asub-col input:focus { border-color: var(--gold-dim); }

    /* Model input */
    .mrow { display: flex; gap: 6px; }
    .minp { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--muted); font-size: 0.64rem; padding: 6px 8px; outline: none; font-family: monospace; }
    .minp:focus { border-color: var(--gold-dim); color: var(--text); }

    /* URL */
    .url-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; font-size: 0.57rem; color: var(--muted); font-family: monospace; word-break: break-all; line-height: 1.7; min-height: 46px; margin-bottom: 10px; }

    /* Buttons */
    .btn { padding: 9px 14px; border-radius: 99px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: transform 0.12s, background 0.15s; letter-spacing: 0.3px; }
    .btn:active { transform: scale(0.96); }
    .btn-sm { padding: 5px 12px; font-size: 0.67rem; border-radius: 7px; }
    .btn-p { background: var(--gold); color: #080807; }
    .btn-p:hover { background: var(--gold2); }
    .btn-s { background: transparent; color: var(--text); border: 1px solid var(--border2); }
    .btn-s:hover { border-color: var(--gold-dim); color: var(--gold2); }
    .brow { display: flex; gap: 8px; }
    .brow .btn { flex: 1; }

    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface); border: 1px solid var(--border2); color: var(--text); padding: 7px 20px; border-radius: 99px; font-size: 0.72rem; font-weight: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 99; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .main { flex-direction: column; }
      .vp    { flex: none; height: 44vh; }
      .panel { width: 100%; border-left: none; border-top: 1px solid var(--border2); }
    }
  </style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-brand">FRONTLINE</div>
    <div class="hdr-sub">AR 3D Editor</div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-s btn-sm" onclick="resetDefaults()">↩ Reset</button>
    <button class="btn btn-p btn-sm" onclick="openAR()">Buka AR ↗</button>
  </div>
</div>

<div class="main">

  <div class="vp" id="vp">
    <canvas id="cv"></canvas>
    <div class="vp-overlay" id="vp-load"><div class="spin"></div><p>Memuat model 3D...</p></div>
    <div class="vp-toolbar">
      <button class="vb active" id="btn-T" onclick="setGizmo('translate')">↔ Move</button>
      <button class="vb"        id="btn-R" onclick="setGizmo('rotate')">↻ Rotate</button>
      <button class="vb"        id="btn-A" onclick="toggleAnim()">⏸ Anim</button>
      <button class="vb"                   onclick="resetView()">⌖ View</button>
    </div>
  </div>

  <div class="panel">

    <div class="sec">
      <div class="stitle">Model 3D</div>
      <div class="mrow">
        <input class="minp" id="model-path" type="text" value="assets/models/rockinghorsgdel-v1.glb" placeholder="assets/models/file.glb">
        <button class="btn btn-s btn-sm" onclick="reloadModel()">Load</button>
      </div>
    </div>

    <div class="sec">
      <div class="stitle">Position</div>
      <div class="xrow"><span class="xlbl">X kiri↔kanan</span><input class="xinp cx" id="posX" type="number" step="0.01" value="0.000" oninput="onCfg()"></div>
      <div class="xrow"><span class="xlbl">Y tinggi ↑</span>   <input class="xinp cy" id="posY" type="number" step="0.01" value="0.000" oninput="onCfg()"></div>
      <div class="xrow"><span class="xlbl">Z maju↔mundur</span><input class="xinp cz" id="posZ" type="number" step="0.01" value="0.000" oninput="onCfg()"></div>
    </div>

    <div class="sec">
      <div class="stitle">Rotation (derajat)</div>
      <div class="xrow"><span class="xlbl">X condong</span><input class="xinp cx" id="rotX" type="number" step="1" value="0.0" oninput="onCfg()"></div>
      <div class="xrow"><span class="xlbl">Y putar</span>  <input class="xinp cy" id="rotY" type="number" step="1" value="0.0" oninput="onCfg()"></div>
      <div class="xrow"><span class="xlbl">Z miring</span> <input class="xinp cz" id="rotZ" type="number" step="1" value="0.0" oninput="onCfg()"></div>
    </div>

    <div class="sec">
      <div class="stitle">Scale / Ukuran</div>
      <div class="srow">
        <input type="range" class="sl" id="scale" min="0.1" max="3.0" step="0.01" value="0.85" oninput="onScale()">
        <span class="snum" id="scale-val">0.85</span>
      </div>
    </div>

    <div class="sec">
      <div class="stitle">Animasi</div>
      <div class="arow"><span class="albl">Goyang kiri-kanan (Rock)</span><label class="tog"><input type="checkbox" id="rockOn" checked oninput="onCfg()"><span class="tog-sl"></span></label></div>
      <div class="asub">
        <div class="asub-col"><label>Sudut max (°)</label><input id="rockAmp" type="number" value="5"    step="0.5" min="0" max="45" oninput="onCfg()"></div>
        <div class="asub-col"><label>Durasi (ms)</label>  <input id="rockDur" type="number" value="1200" step="100" min="200"       oninput="onCfg()"></div>
      </div>
      <div class="arow"><span class="albl">Naik turun (Bob)</span><label class="tog"><input type="checkbox" id="bobOn" checked oninput="onCfg()"><span class="tog-sl"></span></label></div>
      <div class="asub">
        <div class="asub-col"><label>Tinggi max</label>   <input id="bobAmp" type="number" value="0.06" step="0.01" min="0"   oninput="onCfg()"></div>
        <div class="asub-col"><label>Durasi (ms)</label>  <input id="bobDur" type="number" value="1800" step="100"  min="200" oninput="onCfg()"></div>
      </div>
    </div>

    <div class="sec">
      <div class="stitle">Export URL AR</div>
      <div class="url-box" id="url-out"></div>
      <div class="brow">
        <button class="btn btn-s" onclick="copyUrl()">Salin URL</button>
        <button class="btn btn-p" onclick="openAR()">Buka AR</button>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader }        from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }       from 'three/addons/loaders/DRACOLoader.js';
import { OrbitControls }     from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

const DEG = Math.PI / 180;
let scene, camera, renderer, orbit, tctrl, configGroup, animGroup;
let animOn = true;

const cv = document.getElementById('cv');
const vp = document.getElementById('vp');

renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;

scene = new THREE.Scene();
scene.background = new THREE.Color(0x080807);
scene.fog = new THREE.Fog(0x080807, 9, 18);

camera = new THREE.PerspectiveCamera(45, 1, 0.01, 40);
camera.position.set(0, 1.2, 2.4);

// Lights
scene.add(new THREE.AmbientLight(0xfff5dc, 0.7));
const key = new THREE.DirectionalLight(0xffd080, 1.4);
key.position.set(2, 4, 3);
scene.add(key);
const fill = new THREE.DirectionalLight(0xc8a050, 0.3);
fill.position.set(-2, 2, -2);
scene.add(fill);

// Grid — gold tinted
scene.add(new THREE.GridHelper(8, 16, 0x2C2918, 0x1A1710));

// Card plane (rasio kartu standar 85.6×54mm = 0.631)
const cW = 1.0, cH = 0.631;
const cardMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(cW, cH),
  new THREE.MeshLambertMaterial({ color: 0xfff8ee, side: THREE.DoubleSide })
);
cardMesh.rotation.x = -Math.PI / 2;
cardMesh.position.y = 0.001;
scene.add(cardMesh);

const borderLines = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.PlaneGeometry(cW, cH)),
  new THREE.LineBasicMaterial({ color: 0xC8980A })
);
borderLines.rotation.x = -Math.PI / 2;
borderLines.position.y = 0.002;
scene.add(borderLines);

// Orbit
orbit = new OrbitControls(camera, renderer.domElement);
orbit.target.set(0, 0.35, 0);
orbit.enableDamping = true;
orbit.dampingFactor = 0.08;
orbit.minDistance = 0.2;
orbit.maxDistance = 8;
orbit.update();

// Transform gizmo
tctrl = new TransformControls(camera, renderer.domElement);
tctrl.setMode('translate');
tctrl.addEventListener('dragging-changed', e => { orbit.enabled = !e.value; });
tctrl.addEventListener('change', syncToPanel);
scene.add(tctrl);

// Groups: configGroup → animGroup → model
configGroup = new THREE.Group();
scene.add(configGroup);
animGroup = new THREE.Group();
configGroup.add(animGroup);
tctrl.attach(configGroup);

// Resize
function resize() {
  const w = vp.clientWidth, h = vp.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}
resize();
new ResizeObserver(resize).observe(vp);

// Render loop
function loop() {
  requestAnimationFrame(loop);
  if (animOn && animGroup) {
    const t    = performance.now() / 1000;
    const rOn  = document.getElementById('rockOn').checked;
    const bOn  = document.getElementById('bobOn').checked;
    const rAmp = (parseFloat(document.getElementById('rockAmp').value) || 5) * DEG;
    const rDur = (parseFloat(document.getElementById('rockDur').value) || 1200) / 1000;
    const bAmp = parseFloat(document.getElementById('bobAmp').value) || 0.06;
    const bDur = (parseFloat(document.getElementById('bobDur').value) || 1800) / 1000;
    animGroup.rotation.z = rOn ? Math.sin(t * Math.PI * 2 / rDur) * rAmp : 0;
    animGroup.position.y = bOn ? (1 + Math.sin(t * Math.PI * 2 / bDur)) * 0.5 * bAmp : 0;
  }
  orbit.update();
  renderer.render(scene, camera);
}
loop();

// Load model
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

function loadModel(path) {
  const ov = document.getElementById('vp-load');
  ov.style.display = 'flex';
  ov.innerHTML = '<div class="spin"></div><p>Memuat model...</p>';
  while (animGroup.children.length) animGroup.remove(animGroup.children[0]);

  loader.load(path, gltf => {
    const m   = gltf.scene;
    const box = new THREE.Box3().setFromObject(m);
    const sz  = box.getSize(new THREE.Vector3());
    const ct  = box.getCenter(new THREE.Vector3());
    const ns  = 1.0 / Math.max(sz.x, sz.y, sz.z);
    m.scale.setScalar(ns);
    m.position.set(-ct.x * ns, (sz.y * 0.5 - ct.y) * ns, -ct.z * ns);
    animGroup.add(m);
    applyConfig();
    ov.style.display = 'none';
  }, undefined, err => {
    ov.innerHTML = `<p style="color:var(--gold);text-align:center;padding:20px">Gagal load model.<br><small style="color:var(--muted)">${err.message || 'Periksa path file.'}</small></p>`;
  });
}

loadModel(document.getElementById('model-path').value.trim());

// Config → scene
function n(id) { return parseFloat(document.getElementById(id).value) || 0; }

function applyConfig() {
  configGroup.position.set(n('posX'), n('posY'), n('posZ'));
  configGroup.rotation.set(n('rotX') * DEG, n('rotY') * DEG, n('rotZ') * DEG);
  configGroup.scale.setScalar(parseFloat(document.getElementById('scale').value) || 0.85);
  updateUrl();
}

// Gizmo → panel
function syncToPanel() {
  if (!tctrl.dragging) return;
  const p = configGroup.position;
  const r = configGroup.rotation;
  set('posX', p.x.toFixed(3)); set('posY', p.y.toFixed(3)); set('posZ', p.z.toFixed(3));
  set('rotX', (r.x / DEG).toFixed(1)); set('rotY', (r.y / DEG).toFixed(1)); set('rotZ', (r.z / DEG).toFixed(1));
  updateUrl();
}

function set(id, v) {
  const el = document.getElementById(id);
  if (document.activeElement !== el) el.value = v;
}

// URL
function buildUrl() {
  const p = new URLSearchParams({
    posX: n('posX').toFixed(3), posY: n('posY').toFixed(3), posZ: n('posZ').toFixed(3),
    rotX: n('rotX').toFixed(1), rotY: n('rotY').toFixed(1), rotZ: n('rotZ').toFixed(1),
    scale:   (parseFloat(document.getElementById('scale').value) || 0.85).toFixed(2),
    rockOn:  document.getElementById('rockOn').checked  ? '1' : '0',
    rockAmp: document.getElementById('rockAmp').value,
    rockDur: document.getElementById('rockDur').value,
    bobOn:   document.getElementById('bobOn').checked   ? '1' : '0',
    bobAmp:  document.getElementById('bobAmp').value,
    bobDur:  document.getElementById('bobDur').value,
  });
  return `${location.origin}/?${p}`;
}

function updateUrl() { document.getElementById('url-out').textContent = buildUrl(); }

// Toast
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Globals
window.onCfg   = applyConfig;

window.onScale = () => {
  const sl = document.getElementById('scale');
  const v  = parseFloat(sl.value);
  document.getElementById('scale-val').textContent = v.toFixed(2);
  sl.style.setProperty('--p', ((v - +sl.min) / (+sl.max - +sl.min) * 100).toFixed(1) + '%');
  applyConfig();
};

window.setGizmo = mode => {
  tctrl.setMode(mode);
  document.getElementById('btn-T').classList.toggle('active', mode === 'translate');
  document.getElementById('btn-R').classList.toggle('active', mode === 'rotate');
};

window.toggleAnim = () => {
  animOn = !animOn;
  if (!animOn) { animGroup.rotation.z = 0; animGroup.position.y = 0; }
  document.getElementById('btn-A').textContent = animOn ? '⏸ Anim' : '▶ Anim';
  document.getElementById('btn-A').classList.toggle('active', !animOn);
};

window.resetView = () => {
  camera.position.set(0, 1.2, 2.4);
  orbit.target.set(0, 0.35, 0);
  orbit.update();
};

window.reloadModel = () => {
  const p = document.getElementById('model-path').value.trim();
  if (p) loadModel(p);
};

window.resetDefaults = () => {
  ['posX','posY','posZ'].forEach((id,i) => document.getElementById(id).value = ['0.000','0.000','0.000'][i]);
  ['rotX','rotY','rotZ'].forEach(id => document.getElementById(id).value = '0.0');
  document.getElementById('scale').value   = '0.85';
  document.getElementById('rockOn').checked  = true;
  document.getElementById('bobOn').checked   = true;
  document.getElementById('rockAmp').value   = '5';
  document.getElementById('rockDur').value   = '1200';
  document.getElementById('bobAmp').value    = '0.06';
  document.getElementById('bobDur').value    = '1800';
  window.onScale();
  applyConfig();
  toast('Reset ke default');
};

window.copyUrl = () => {
  const url = buildUrl();
  (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject())
    .then(() => toast('URL disalin!'))
    .catch(() => {
      const ta = Object.assign(document.createElement('textarea'), { value: url });
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
      toast('URL disalin!');
    });
};

window.openAR = () => window.open(buildUrl(), '_blank');

// Init
window.onScale();
updateUrl();
</script>
</body>
</html>
